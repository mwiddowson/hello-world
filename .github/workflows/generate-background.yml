name: Generate Progress Wallpapers

on:
  schedule:
    - cron: "5 0 * * *"   # 00:05 UTC daily
  push:
    branches: [master]
  workflow_dispatch:        # manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate lock screen image (year)
        run: python generate_background.py

      - name: Generate home screen image (month)
        run: python generate_home.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/background.png docs/home.png
          git diff --staged --quiet || git commit -m "chore: regenerate progress wallpapers [skip ci]"
          git push
