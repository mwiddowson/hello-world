<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year Progress Wallpaper</title>
  <style>
    body {
      background: #111;
      color: #888;
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
      margin: 0;
    }
    img {
      max-width: 375px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    p { margin-top: 1rem; font-size: 0.9rem; }
    a { color: #aaa; }
  </style>
</head>
<body>
  <img src="background.png" alt="Year progress wallpaper">
  <p>Updates daily at 00:05 UTC via GitHub Actions.</p>
  <p><a href="background.png">Direct image link</a> — use this URL in your iOS Shortcut.</p>
</body>
</html>
